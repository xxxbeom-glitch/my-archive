<!DOCTYPE html>
<html class="light h-screen overflow-hidden" lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>seongbeom's archive</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
  .material-symbols-outlined {
    font-family: "Material Symbols Outlined";
    font-weight: normal;
    font-style: normal;
    font-size: 24px;
    line-height: 1;
    display: inline-block;
    direction: ltr;
    letter-spacing: normal;
    text-transform: none;
    white-space: nowrap;
    word-wrap: normal;
    -webkit-font-feature-settings: "liga";
    -webkit-font-smoothing: antialiased;
    font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 24;
  }
  .tag-pill {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
    background: rgba(255, 255, 255, 0.60);
    color: #484848;
    font-family: Pretendard, sans-serif;
    font-style: normal;
    font-weight: 600;
  }
  #project-grid .tag-pill {
    padding: var(--thumb-tag-py, 6px) var(--thumb-tag-px, 10px);
    font-size: var(--thumb-tag-fs, 10px);
    line-height: var(--thumb-tag-lh, 12px);
    border-radius: var(--thumb-tag-radius, 16px);
  }
  .card-meta {
    pointer-events: none;
    position: absolute;
    z-index: 1;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    left: var(--thumb-meta-left, 24px);
    top: var(--thumb-meta-top, 36px);
    width: var(--thumb-meta-width, 168px);
    gap: var(--thumb-meta-gap, 4px);
  }
  #project-grid .thumb-card-year {
    margin: 0;
    font-family: Pretendard, sans-serif;
    font-size: var(--thumb-year-fs, 14px);
    line-height: var(--thumb-year-lh, 18px);
    font-weight: var(--thumb-year-weight, 500);
    color: #202020;
  }
  #project-grid .thumb-card-title {
    margin: 0;
    margin-top: var(--thumb-title-mt, 0px);
    font-family: Pretendard, sans-serif;
    font-size: var(--thumb-title-fs, 18px);
    line-height: var(--thumb-title-lh, 26px);
    font-weight: var(--thumb-title-weight, 700);
    color: #202020;
  }
  #project-grid .thumb-card-tags {
    display: flex;
    flex-wrap: wrap;
    margin: 0;
    margin-top: var(--thumb-tags-mt, 2px);
    gap: var(--thumb-tags-gap, 4px);
  }
  #project-grid .project-card .card-bg-img {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: transform 0.4s ease;
    transform: scale(1);
    z-index: 0;
    border-radius: inherit;
  }
  #project-grid .project-card:hover .card-bg-img {
    transform: scale(1.07);
  }
  #project-grid .project-card .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 1;
    pointer-events: none;
    border-radius: inherit;
  }
  #project-grid .project-card:hover .card-overlay {
    opacity: 1;
  }
  #project-grid .project-card .card-meta {
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 2;
  }
  #project-grid .project-card:hover .card-meta {
    opacity: 1;
  }
  #project-grid .project-card .thumb-card-year,
  #project-grid .project-card .thumb-card-title {
    transition: color 0.25s ease;
  }
  #project-grid .project-card:hover .thumb-card-year,
  #project-grid .project-card:hover .thumb-card-title {
    color: #ffffff;
  }
  #project-grid .project-card .tag-pill {
    transition: background 0.25s ease, color 0.25s ease;
  }
  #project-grid .project-card:hover .tag-pill {
    background: rgba(255, 255, 255, 0.2);
    color: #ffffff;
  }
  #lightbox-scroll {
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    scrollbar-width: none;
    -ms-overflow-style: none;
    box-sizing: border-box;
    max-width: 100%;
  }
  #lightbox-scroll::-webkit-scrollbar {
    display: none;
  }
  /* 너비 900px 초과 이미지는 비율 유지해 컬럼 너비 안에 맞춤(잘림 없음) */
  #lightbox-img {
    display: block;
    box-sizing: border-box;
    width: auto;
    max-width: 100%;
    height: auto;
    margin-left: auto;
    margin-right: auto;
  }
  html, body {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    height: 100%;
    max-height: 100vh;
  }
  main,
  main > div {
    margin: 0;
    padding: 0;
  }
  .thumbs-no-scrollbar {
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .thumbs-no-scrollbar::-webkit-scrollbar { display: none; }
  .lb-detail-title {
    margin: 0;
    font-family: Pretendard, sans-serif;
    font-size: 28px;
    font-weight: 700;
    font-style: normal;
    line-height: 1.25;
    letter-spacing: -0.02em;
    color: #202020;
  }
  .lb-detail-body {
    margin: 24px 0 0 0;
    font-family: Pretendard, sans-serif;
    font-size: 15px;
    font-weight: 400;
    font-style: normal;
    line-height: 1.7;
    color: #484848;
    white-space: pre-line;
  }
  .typed-cursor {
    display: inline;
    font-weight: 300;
    color: #202020;
    vertical-align: baseline;
  }
  .typed-cursor--blink {
    animation: heroTypedBlink 0.75s step-end infinite;
  }
  @keyframes heroTypedBlink {
    50% { opacity: 0; }
  }
  .site-nav-item {
    border: 0;
    background: transparent;
    font: inherit;
    color: inherit;
    cursor: pointer;
    padding: 0;
    margin: 0;
    text-align: left;
    width: 100%;
    transition: opacity 0.2s ease;
  }
  .site-nav-item:focus-visible {
    outline: 2px solid #202020;
    outline-offset: 2px;
  }
  .site-nav-item--active {
    opacity: 1;
  }
  .site-nav-item:not(.site-nav-item--active) {
    opacity: 0.4;
  }
  a.site-nav-item {
    text-decoration: none;
    display: block;
    color: inherit;
  }
  .mobile-nav-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border: 0;
    border-radius: 8px;
    background: rgba(242, 242, 242, 0.92);
    color: #202020;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
  }
  .mobile-nav-toggle:focus-visible {
    outline: 2px solid #202020;
    outline-offset: 2px;
  }
  body.mobile-menu-open .mobile-nav-toggle {
    visibility: hidden;
    pointer-events: none;
  }
  .mobile-nav-overlay {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    background: #fff;
    padding: 2rem;
    box-sizing: border-box;
  }
  .mobile-nav-overlay.is-open {
    display: flex;
  }
  .mobile-nav-overlay__close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border: 0;
    border-radius: 8px;
    background: transparent;
    color: #202020;
    cursor: pointer;
  }
  .mobile-nav-overlay__link {
    font-size: 32px;
    font-weight: 500;
    line-height: 1.2;
    color: #202020;
    text-decoration: none;
    border: 0;
    background: none;
    font: inherit;
    cursor: pointer;
    padding: 0.25rem 0;
  }
  @media (max-width: 768px) {
    .index-hero-column {
      min-height: 100svh;
      min-height: 100vh;
      width: 100%;
      max-width: 100vw;
      box-sizing: border-box;
      padding-left: 1rem;
      padding-right: 1rem;
      justify-content: center;
    padding-bottom: 2rem;
    }
    #site-nav {
      display: none !important;
    }
    .mobile-nav-toggle {
      display: flex;
    }
    #thumbs-column {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      height: 100vh;
      height: 100dvh;
      margin-top: 0 !important;
      padding: 12px 16px 32px !important;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 100;
      transform: translateY(100%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.6s ease-out, opacity 0.6s ease-out;
      -webkit-overflow-scrolling: touch;
      align-items: stretch !important;
    }
    #thumbs-column.mobile-thumbs-revealed {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
  }
  @media (min-width: 769px) {
    .mobile-nav-overlay {
      display: none !important;
      pointer-events: none !important;
    }
  }
</style>
</head>
<body class="h-screen max-h-screen overflow-hidden bg-[#f2f2f2] text-[#202020]">
<main class="flex h-screen max-h-screen w-full min-h-0 justify-center overflow-x-hidden overflow-y-hidden">
  <div class="flex h-full min-h-0 w-full min-w-0 max-w-[1800px] flex-col items-stretch lg:flex-row">
    <!-- 좌측 ~32%: 텍스트 시작 상단 195px, 스크롤 없음 · min-w-0으로 긴 텍스트가 가로로 줄 밀착 방지 -->
    <section class="index-hero-column flex w-full min-w-0 shrink-0 flex-col justify-start overflow-hidden pt-16 pb-8 lg:pt-[195px] lg:pb-0 lg:w-[32%] lg:min-h-0 lg:px-0 lg:pr-6">
      <p class="sr-only">
        안녕하세요. UI/UX 디자이너 박성범입니다. 이곳은 그동안 제가 참여한 프로젝트의 아카이브 공간입니다. work, career.
      </p>
      <div class="text-[28px] font-normal leading-[40px] text-[#202020] sm:text-[36px] sm:leading-[50px] lg:text-[40px] lg:leading-[55px]">
        <span id="typed-output" class="inline min-h-[1.2em]" role="status" aria-hidden="true"></span>
      </div>
      <nav
        id="site-nav"
        class="fixed bottom-[120px] left-[max(1rem,calc((100vw-1800px)/2))] z-10 flex flex-col gap-[6px] text-[20px] font-normal leading-[26px] text-[#202020]"
        aria-label="주요 메뉴"
      >
        <button type="button" class="site-nav-item site-nav-item--active" data-nav="work" aria-current="page">work</button>
        <a href="/career" class="site-nav-item">career</a>
      </nav>
    </section>

    <!-- 우측 ~68%: 그리드 상단 120px, 하단 패딩=카드 높이의 ½ · 카드 너비+간격만큼 최소 폭 확보 -->
    <section id="thumbs-column" class="thumbs-no-scrollbar mt-8 flex min-h-0 w-full min-w-0 flex-1 flex-col items-start overflow-x-auto overflow-y-auto pt-[120px] pr-4 sm:pr-6 lg:mt-0 lg:w-[68%] lg:min-w-0 lg:self-stretch">
      <div id="thumb-panel-work" class="shrink-0">
        <div id="thumbs-grid-wrap" class="shrink-0">
          <div id="project-grid" class="grid w-max max-w-none"></div>
        </div>
      </div>
    </section>
  </div>
</main>

<button
  type="button"
  id="mobile-nav-toggle"
  class="mobile-nav-toggle fixed z-[1100]"
  style="top: 20px; right: 20px;"
  aria-label="메뉴 열기"
  aria-expanded="false"
  aria-controls="mobile-nav-overlay"
>
  <span class="material-symbols-outlined text-[26px] leading-none">menu</span>
</button>
<div
  id="mobile-nav-overlay"
  class="mobile-nav-overlay fixed inset-0 z-[1090]"
  aria-hidden="true"
  role="dialog"
  aria-modal="true"
  aria-label="메뉴"
>
  <button type="button" id="mobile-nav-close" class="mobile-nav-overlay__close" aria-label="메뉴 닫기">
    <span class="material-symbols-outlined text-[28px] leading-none">close</span>
  </button>
  <nav class="flex flex-col items-center gap-8" aria-label="모바일 주요 메뉴">
    <button type="button" class="mobile-nav-overlay__link" data-mobile-nav="work">work</button>
    <a href="/career" class="mobile-nav-overlay__link">career</a>
  </nav>
</div>

<!-- Lightbox: 풀스크린 팝업 · 좌(상단) 텍스트 · 우(하단) 이미지 스크롤 -->
<div id="lightbox-overlay" class="pointer-events-none fixed inset-0 z-[1200] flex min-h-0 flex-col bg-white opacity-0 transition-opacity duration-[400ms]" aria-hidden="true" role="dialog" aria-modal="true">
  <button type="button" id="lightbox-close" class="pointer-events-auto absolute right-5 top-5 z-[1210] flex h-[52px] w-[52px] items-center justify-center rounded-full border border-neutral-300 bg-white text-[#202020] shadow-sm transition-colors duration-200 hover:bg-neutral-100" aria-label="닫기">
    <span class="material-symbols-outlined text-[18px] leading-none">close</span>
  </button>
  <div id="lightbox-popup" class="box-border flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden lg:flex-row">
    <aside class="lb-aside flex shrink-0 flex-col overflow-y-auto px-6 pb-4 pt-16 lg:w-[min(400px,42vw)] lg:max-w-md lg:shrink-0 lg:overflow-y-auto lg:px-10 lg:pb-8 lg:pr-8 lg:pt-24">
      <h2 id="lightbox-detail-title" class="lb-detail-title"></h2>
      <div id="lightbox-detail-body" class="lb-detail-body"></div>
    </aside>
    <div id="lightbox-scroll" class="min-h-0 min-w-0 flex-1 overflow-y-auto overflow-x-hidden bg-[#D8D8D8]">
      <img id="lightbox-img" alt="" class="m-0 block border-0 p-0"/>
    </div>
  </div>
</div>

<script src="hero-name-animation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
<script>
(function () {
  var el = document.getElementById("typed-output");
  if (!el || typeof Typed === "undefined") return;
  var heroString =
    "안녕하세요<br>UI/UX 디자이너<br>박성범입니다^500<br><br>이곳은 그동안<br>제가 참여한 프로젝트의<br>아카이브 공간입니다";
  new Typed(el, {
    strings: [heroString],
    typeSpeed: 60,
    startDelay: 300,
    showCursor: true,
    cursorChar: "|",
    loop: false,
    contentType: "html",
    smartBackspace: false,
    backDelay: 0,
    onComplete: function () {
      if (typeof runHeroNameDragSelect === "function") {
        runHeroNameDragSelect("#typed-output");
      }
      try {
        window.dispatchEvent(new CustomEvent("index-typed-complete"));
      } catch (err) {}
    }
  });
})();
</script>
<script>
(function () {
  var STORAGE_KEY = "studio-archive-portfolio-v1";
  var PLACEHOLDER = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";

  var DEFAULT_WORKS = [
    {
      index: "WORK #1",
      title: "원더플레이스",
      description: "",
      location: "2026",
      detailTitle: "모바일 커머스 탐색·구매 동선 재설계",
      detailBody:
        "사용자 리서치를 바탕으로 카테고리 진입부터 결제 완료까지 단계별 이탈 지점을 정리하고, 시각적 위계와 여백을 조정해 스캔 가능한 레이아웃으로 정리했습니다.\n\n핵심 상품과 프로모션을 첫 화면에서 명확히 드러내고, 필터·정렬 패턴을 통일해 반복 탐색 시 인지 부담을 줄였습니다."
    },
    {
      index: "WORK #2",
      title: "원더플레이스",
      description: "",
      location: "2026",
      detailTitle: "브랜드 일관성과 접근성을 고려한 UI 키트",
      detailBody:
        "컬러·타이포·컴포넌트 스펙을 문서화해 제품·마케팼 채널 간 시각적 언어를 맞추었습니다.\n\n대비·터치 타깃·포커스 상태를 점검해 WCAG 기준에 가깝게 맞추는 방향으로 컴포넌트 가이드를 제안했습니다."
    },
    {
      index: "WORK #3",
      title: "원더플레이스",
      description: "",
      location: "2026",
      detailTitle: "데이터 기반 대시보드 정보 구조",
      detailBody:
        "운영 지표의 우선순위를 정의하고, 한 화면에서 ‘지금 확인해야 할 상태’가 드러나도록 카드·차트 배치를 재구성했습니다.\n\n모바일 뷰에서는 핵심 KPI만 노출하고 상세는 드릴다운으로 이어지도록 단계를 나누었습니다."
    }
  ];

  var cardColors = ["#E8E8E8", "#DEDEDE", "#D4D4D4", "#EBEBEB", "#E0E0E0", "#D8D8D8"];
  var TAGS = ["APP", "WEB", "E-Commerce"];

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function cardTags(w) {
    if (w && Array.isArray(w.tags)) {
      var list = w.tags.map(function (x) {
        return String(x || "").trim();
      }).filter(Boolean);
      if (list.length) return list;
    }
    return TAGS;
  }

  /** null = 저장 없음(최초 방문), [] = 의도적 빈 목록 */
  function loadWorks() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw || !raw.trim()) return null;
      var arr = JSON.parse(raw);
      if (!Array.isArray(arr)) return null;
      return arr;
    } catch (e) {
      return null;
    }
  }

  function cloneDefault() {
    return JSON.parse(JSON.stringify(DEFAULT_WORKS));
  }

  function overlaySrc(w) {
    if (!w) return PLACEHOLDER;
    return w.overlayDataUrl || w.overlayUrl || w.thumbnailDataUrl || w.thumbnailUrl || PLACEHOLDER;
  }

  function thumbCardSrc(w) {
    if (!w) return "";
    return w.thumbnailDataUrl || w.thumbnailUrl || "";
  }

  function yearLabel(w) {
    if (!w || !w.location) return "2026";
    var m = String(w.location).match(/(20\d{2})/);
    return m ? m[1] : "2026";
  }

  function titleLabel(w) {
    return (w && w.title) ? w.title : "원더플레이스";
  }

  /** localStorage에 없을 때만 사용하는 projects.json 스냅샷(null이면 내장 DEFAULT) */
  var WORKS_FILE = null;
  var storedWorksInit = loadWorks();
  var WORKS =
    storedWorksInit !== null ? storedWorksInit : cloneDefault();
  var grid = document.getElementById("project-grid");

  if (storedWorksInit === null) {
    fetch("projects.json")
      .then(function (r) {
        if (!r.ok) throw new Error("projects.json not ok");
        return r.json();
      })
      .then(function (data) {
        if (!Array.isArray(data)) return;
        WORKS_FILE = JSON.parse(JSON.stringify(data));
        if (loadWorks() !== null) return;
        WORKS = JSON.parse(JSON.stringify(data));
        lastThumbRenderKey = "";
        scheduleThumbLayout();
      })
      .catch(function () {
        /* WORKS_FILE 유지 null → pullWorksFromStorage에서 cloneDefault() */
      });
  }
  var overlay = document.getElementById("lightbox-overlay");
  var lbScroll = document.getElementById("lightbox-scroll");
  var lbImg = document.getElementById("lightbox-img");
  var lbDetailTitle = document.getElementById("lightbox-detail-title");
  var lbDetailBody = document.getElementById("lightbox-detail-body");
  var lbClose = document.getElementById("lightbox-close");
  var lightboxOpen = false;

  function detailTitleText(w) {
    if (w && String(w.detailTitle || "").trim()) return String(w.detailTitle).trim();
    return "프로젝트 상세 제목";
  }

  function detailBodyText(w) {
    if (w && String(w.detailBody || "").trim()) return String(w.detailBody).trim();
    return (
      "Admin의 「팝업 상세」 필드에서 이 프로젝트 전용 제목·본문을 입력해 주세요.\n\n" +
      "썸네일 카드에 보이는 연도·제목·태그와는 별도로, 오버레이에만 표시됩니다."
    );
  }

  function openLightbox(w) {
    if (lbScroll) lbScroll.scrollTop = 0;
    lbImg.src = overlaySrc(w);
    lbImg.alt = detailTitleText(w);
    if (lbDetailTitle) lbDetailTitle.textContent = detailTitleText(w);
    if (lbDetailBody) lbDetailBody.textContent = detailBodyText(w);
    lightboxOpen = true;
    overlay.classList.remove("pointer-events-none", "opacity-0", "opacity-100");
    overlay.classList.add("opacity-100");
    overlay.setAttribute("aria-hidden", "false");
  }

  function closeLightbox() {
    if (!lightboxOpen) return;
    lightboxOpen = false;
    overlay.classList.remove("opacity-100");
    overlay.classList.add("opacity-0", "pointer-events-none");
    overlay.setAttribute("aria-hidden", "true");
  }

  var thumbStyleDefaults = {
    "cardW": 500,
    "cardH": 550,
    "metaLeft": 28,
    "metaTop": 38,
    "metaWidth": 300,
    "metaGap": 4,
    "yearFs": 14,
    "yearLh": 18,
    "yearWeight": 500,
    "titleFs": 20,
    "titleLh": 28,
    "titleMt": 2,
    "titleWeight": 600,
    "tagsMt": 5,
    "tagsGap": 6,
    "tagFs": 12,
    "tagLh": 14,
    "tagPx": 12,
    "tagPy": 8,
    "tagRadius": 18
  };

  function normalizeThumbStyleObject(o) {
    var d = thumbStyleDefaults;
    if (!o || typeof o !== "object") o = {};
    return {
      cardW: intish(o.cardW, d.cardW, 280, 800),
      cardH: intish(o.cardH, d.cardH, 320, 900),
      metaLeft: intish(o.metaLeft, d.metaLeft, 0, 200),
      metaTop: intish(o.metaTop, d.metaTop, 0, 200),
      metaWidth: intish(o.metaWidth, d.metaWidth, 80, 400),
      metaGap: intish(o.metaGap, d.metaGap, 0, 24),
      yearFs: intish(o.yearFs, d.yearFs, 10, 24),
      yearLh: intish(o.yearLh, d.yearLh, 12, 32),
      yearWeight: intish(o.yearWeight, d.yearWeight, 400, 700),
      titleFs: intish(o.titleFs, d.titleFs, 12, 36),
      titleLh: intish(o.titleLh, d.titleLh, 14, 44),
      titleMt: intish(o.titleMt, d.titleMt, 0, 24),
      titleWeight: intish(o.titleWeight, d.titleWeight, 500, 900),
      tagsMt: intish(o.tagsMt, d.tagsMt, 0, 24),
      tagsGap: intish(o.tagsGap, d.tagsGap, 0, 16),
      tagFs: intish(o.tagFs, d.tagFs, 8, 16),
      tagLh: intish(o.tagLh, d.tagLh, 10, 20),
      tagPx: intish(o.tagPx, d.tagPx, 4, 20),
      tagPy: intish(o.tagPy, d.tagPy, 2, 16),
      tagRadius: intish(o.tagRadius, d.tagRadius, 0, 24)
    };
  }

  function intish(v, def, min, max) {
    var n = typeof v === "number" ? v : parseInt(v, 10);
    if (isNaN(n)) n = def;
    return Math.max(min, Math.min(max, Math.round(n)));
  }

  var thumbStyle = normalizeThumbStyleObject(thumbStyleDefaults);
  var THUMB_GRID_GAP_X = 8;
  var THUMB_GRID_GAP_Y = 8;

  function isMobileIndex() {
    return typeof window.matchMedia === "function" && window.matchMedia("(max-width: 768px)").matches;
  }

  function getThumbCellDims() {
    if (isMobileIndex()) {
      var pad = 32;
      var cw = Math.max(240, Math.min(window.innerWidth || 0, 768) - pad);
      if (cw < 240) cw = Math.max(240, (window.innerWidth || 375) - pad);
      return { cardW: cw, cardH: cw };
    }
    return { cardW: thumbStyle.cardW, cardH: thumbStyle.cardH };
  }

  function applyThumbStyleToDom() {
    if (!grid) return;
    var s = thumbStyle;
    var wrap = document.getElementById("thumbs-grid-wrap");
    grid.style.setProperty("--thumb-meta-left", s.metaLeft + "px");
    grid.style.setProperty("--thumb-meta-top", s.metaTop + "px");
    grid.style.setProperty("--thumb-meta-width", s.metaWidth + "px");
    grid.style.setProperty("--thumb-meta-gap", s.metaGap + "px");
    grid.style.setProperty("--thumb-year-fs", s.yearFs + "px");
    grid.style.setProperty("--thumb-year-lh", s.yearLh + "px");
    grid.style.setProperty("--thumb-year-weight", String(s.yearWeight));
    grid.style.setProperty("--thumb-title-fs", s.titleFs + "px");
    grid.style.setProperty("--thumb-title-lh", s.titleLh + "px");
    grid.style.setProperty("--thumb-title-mt", s.titleMt + "px");
    grid.style.setProperty("--thumb-title-weight", String(s.titleWeight));
    grid.style.setProperty("--thumb-tags-mt", s.tagsMt + "px");
    grid.style.setProperty("--thumb-tags-gap", s.tagsGap + "px");
    grid.style.setProperty("--thumb-tag-fs", s.tagFs + "px");
    grid.style.setProperty("--thumb-tag-lh", s.tagLh + "px");
    grid.style.setProperty("--thumb-tag-px", s.tagPx + "px");
    grid.style.setProperty("--thumb-tag-py", s.tagPy + "px");
    grid.style.setProperty("--thumb-tag-radius", s.tagRadius + "px");
    if (isMobileIndex()) {
      var d = getThumbCellDims();
      grid.style.columnGap = THUMB_GRID_GAP_Y + "px";
      grid.style.rowGap = THUMB_GRID_GAP_Y + "px";
      grid.style.gridTemplateColumns = d.cardW + "px";
      grid.style.width = "100%";
      grid.style.minWidth = "0";
      grid.style.maxWidth = "100%";
      if (wrap) {
        wrap.style.width = "100%";
        wrap.style.minWidth = "0";
        wrap.style.maxWidth = "100%";
      }
    } else {
      grid.style.columnGap = THUMB_GRID_GAP_X + "px";
      grid.style.rowGap = THUMB_GRID_GAP_Y + "px";
      grid.style.gridTemplateColumns = s.cardW + "px " + s.cardW + "px";
      var gwpx = s.cardW * 2 + THUMB_GRID_GAP_X;
      grid.style.width = gwpx + "px";
      grid.style.minWidth = gwpx + "px";
      grid.style.maxWidth = "";
      if (wrap) {
        wrap.style.width = gwpx + "px";
        wrap.style.minWidth = gwpx + "px";
        wrap.style.maxWidth = "";
      }
    }
    syncRoutePanelWidth();
  }

  var currentNav = "work";
  var panelWork = document.getElementById("thumb-panel-work");
  var siteNavEl = document.getElementById("site-nav");

  function syncRoutePanelWidth() {
    if (isMobileIndex()) {
      if (panelWork) {
        panelWork.style.width = "100%";
        panelWork.style.minWidth = "0";
        panelWork.style.maxWidth = "100%";
      }
      return;
    }
    var wpx = thumbStyle.cardW * 2 + THUMB_GRID_GAP_X;
    var ws = wpx + "px";
    if (panelWork) {
      panelWork.style.width = ws;
      panelWork.style.minWidth = ws;
      panelWork.style.maxWidth = "";
    }
  }

  function setRoutePanelVisibility() {
    currentNav = "work";
    if (panelWork) panelWork.classList.remove("hidden");
    syncRoutePanelWidth();
    scheduleThumbLayout();
  }

  function wireSiteNav() {
    if (!siteNavEl) return;
    var navBtns = siteNavEl.querySelectorAll("button.site-nav-item[data-nav]");
    function setNavActiveUi(name) {
      navBtns.forEach(function (btn) {
        var on = btn.getAttribute("data-nav") === name;
        btn.classList.toggle("site-nav-item--active", on);
        if (on) btn.setAttribute("aria-current", "page");
        else btn.removeAttribute("aria-current");
      });
    }
    navBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        var n = btn.getAttribute("data-nav");
        setNavActiveUi(n);
        setRoutePanelVisibility();
      });
    });
    setNavActiveUi("work");
    setRoutePanelVisibility();
  }

  applyThumbStyleToDom();

  var thumbsColumn = document.getElementById("thumbs-column");
  var thumbsGridWrap = document.getElementById("thumbs-grid-wrap");
  var lastThumbRenderKey = "";

  /** 썸네일 그리드 좌측 = 열 좌측과 맞춤(career.html과 동일 기준). 가로 스크롤은 왼쪽부터 */
  function scrollThumbsColumnToStart() {
    if (!thumbsColumn) return;
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        thumbsColumn.scrollLeft = 0;
        thumbsColumn.scrollTop = 0;
      });
    });
  }

  function gridWidthPx() {
    if (isMobileIndex()) {
      return getThumbCellDims().cardW;
    }
    var GRID_W = thumbStyle.cardW * 2 + THUMB_GRID_GAP_X;
    if (!grid) return GRID_W;
    var w = grid.getBoundingClientRect().width;
    if (w > 0) return Math.min(GRID_W, Math.round(w));
    if (thumbsColumn) return Math.min(GRID_W, thumbsColumn.clientWidth);
    return GRID_W;
  }

  function pullWorksFromStorage() {
    var stored = loadWorks();
    if (stored !== null) {
      WORKS = stored;
      return;
    }
    if (WORKS_FILE !== null) {
      WORKS = WORKS_FILE;
      return;
    }
    WORKS = cloneDefault();
  }

  function worksFingerprint(arr) {
    if (!arr || !arr.length) return "0";
    return arr
      .map(function (w, i) {
        var t = thumbCardSrc(w);
        var td = t.indexOf("data:") === 0 ? String(t.length) : t;
        return [
          i,
          td,
          w.title || "",
          w.location || "",
          (w.overlayDataUrl && String(w.overlayDataUrl.length)) || w.overlayUrl || ""
        ].join("\x1e");
      })
      .join("\x1f");
  }

  function renderThumbs() {
    if (currentNav !== "work") return;
    if (!grid || !thumbsColumn) return;
    applyThumbStyleToDom();
    pullWorksFromStorage();
    var mobile = isMobileIndex();
    var dims = getThumbCellDims();
    var gw = gridWidthPx();
    var ch = thumbsColumn.clientHeight;
    var nReal = WORKS.length;
    var total = nReal;
    var fp = worksFingerprint(WORKS);
    var layoutTag = mobile ? "m1" : "d2";
    var key =
      fp +
      "|" +
      total +
      "|" +
      gw +
      "|" +
      ch +
      "|" +
      dims.cardW +
      "|" +
      dims.cardH +
      "|" +
      THUMB_GRID_GAP_X +
      "|" +
      THUMB_GRID_GAP_Y +
      "|" +
      layoutTag;
    if (key === lastThumbRenderKey && grid.childElementCount === total) {
      scrollThumbsColumnToStart();
      return;
    }
    lastThumbRenderKey = key;

    var padBottom = total > 0 ? (mobile ? dims.cardH / 3 : thumbStyle.cardH / 2) : 0;
    if (thumbsGridWrap) thumbsGridWrap.style.paddingBottom = padBottom + "px";

    grid.innerHTML = "";

    for (var i = 0; i < total; i++) {
      var slot = document.createElement("article");
      var radiusClass = " rounded-3xl";
      slot.className =
        "relative shrink-0 overflow-hidden project-card cursor-pointer" + radiusClass;
      if (mobile) {
        slot.style.width = "100%";
        slot.style.maxWidth = dims.cardW + "px";
        slot.style.marginLeft = "auto";
        slot.style.marginRight = "auto";
        slot.style.aspectRatio = "1 / 1";
        slot.style.height = "auto";
      } else {
        slot.style.width = dims.cardW + "px";
        slot.style.height = dims.cardH + "px";
        slot.style.aspectRatio = "";
        slot.style.maxWidth = "";
        slot.style.marginLeft = "";
        slot.style.marginRight = "";
      }
      var w = WORKS[i];
      var tsrc = thumbCardSrc(w);
      slot.style.backgroundColor = cardColors[i % 6];
      slot.style.backgroundImage = "none";
      slot.setAttribute("data-work-index", String(i));

      var cardBg = document.createElement("div");
      cardBg.className = "card-bg-img";
      cardBg.setAttribute("aria-hidden", "true");
      if (tsrc) {
        cardBg.style.backgroundImage = 'url("' + tsrc.split('"').join("%22") + '")';
      }
      slot.appendChild(cardBg);

      var overlay = document.createElement("div");
      overlay.className = "card-overlay";
      overlay.setAttribute("aria-hidden", "true");
      slot.appendChild(overlay);

      var meta = document.createElement("div");
      meta.className = "card-meta";
      meta.innerHTML =
        '<p class="thumb-card-year">' + escapeHtml(yearLabel(w)) + "</p>" +
        '<p class="thumb-card-title">' + escapeHtml(titleLabel(w)) + "</p>" +
        '<div class="thumb-card-tags">' +
        cardTags(w)
          .map(function (t) {
            return '<span class="tag-pill">' + escapeHtml(t) + "</span>";
          })
          .join("") +
        "</div>";
      slot.appendChild(meta);

      slot.addEventListener("click", function (ev) {
        var wi = parseInt(ev.currentTarget.getAttribute("data-work-index"), 10);
        pullWorksFromStorage();
        if (wi >= 0 && wi < WORKS.length) openLightbox(WORKS[wi]);
      });

      grid.appendChild(slot);
    }

    scrollThumbsColumnToStart();
  }

  function scheduleThumbLayout() {
    requestAnimationFrame(function () {
      renderThumbs();
    });
  }

  scheduleThumbLayout();

  if (thumbsColumn && typeof ResizeObserver !== "undefined") {
    var ro = new ResizeObserver(scheduleThumbLayout);
    ro.observe(thumbsColumn);
  } else {
    window.addEventListener("resize", scheduleThumbLayout);
  }

  function invalidateThumbsAndRelayout() {
    lastThumbRenderKey = "";
    scheduleThumbLayout();
  }

  function initMobileThumbIntro() {
    var col = document.getElementById("thumbs-column");
    if (!col) return;
    var relayoutAfterRevealDone = false;
    function relayoutAfterReveal() {
      if (relayoutAfterRevealDone) return;
      relayoutAfterRevealDone = true;
      invalidateThumbsAndRelayout();
    }
    function revealNow() {
      col.classList.add("mobile-thumbs-revealed");
      function onTe(ev) {
        if (ev.target !== col) return;
        if (ev.propertyName !== "transform" && ev.propertyName !== "opacity") return;
        col.removeEventListener("transitionend", onTe);
        relayoutAfterReveal();
      }
      col.addEventListener("transitionend", onTe);
      setTimeout(relayoutAfterReveal, 700);
    }
    if (!isMobileIndex()) {
      col.classList.add("mobile-thumbs-revealed");
      return;
    }
    col.classList.remove("mobile-thumbs-revealed");
    var revealed = false;
    function reveal() {
      if (revealed) return;
      revealed = true;
      revealNow();
    }
    if (!document.getElementById("typed-output") || typeof window.Typed === "undefined") {
      setTimeout(reveal, 500);
      return;
    }
    window.addEventListener("index-typed-complete", function onTyped() {
      window.removeEventListener("index-typed-complete", onTyped);
      setTimeout(reveal, 1000);
    });
    setTimeout(function () {
      if (!col.classList.contains("mobile-thumbs-revealed")) reveal();
    }, 14000);
  }

  function wireMobileNav() {
    var toggle = document.getElementById("mobile-nav-toggle");
    var overlay = document.getElementById("mobile-nav-overlay");
    var closeBtn = document.getElementById("mobile-nav-close");
    if (!toggle || !overlay) return;
    function closeNav() {
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden", "true");
      toggle.setAttribute("aria-expanded", "false");
      document.body.style.overflow = "";
      document.body.classList.remove("mobile-menu-open");
    }
    function openNav() {
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");
      toggle.setAttribute("aria-expanded", "true");
      document.body.style.overflow = "hidden";
      document.body.classList.add("mobile-menu-open");
    }
    toggle.addEventListener("click", function () {
      if (overlay.classList.contains("is-open")) closeNav();
      else openNav();
    });
    if (closeBtn) closeBtn.addEventListener("click", closeNav);
    overlay.querySelectorAll("a.mobile-nav-overlay__link, [data-mobile-nav]").forEach(function (el) {
      el.addEventListener("click", closeNav);
    });
  }

  var _indexLastMobile = isMobileIndex();
  window.addEventListener("resize", function () {
    var m = isMobileIndex();
    if (m !== _indexLastMobile) {
      _indexLastMobile = m;
      var col = document.getElementById("thumbs-column");
      if (col && !m) col.classList.add("mobile-thumbs-revealed");
      applyThumbStyleToDom();
      invalidateThumbsAndRelayout();
    }
  });

  window.addEventListener("storage", function (e) {
    if (e.key === STORAGE_KEY) invalidateThumbsAndRelayout();
  });
  window.addEventListener("pageshow", function (e) {
    if (e.persisted) invalidateThumbsAndRelayout();
  });
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) return;
    if (currentNav !== "work") return;
    var stored = loadWorks();
    var next =
      stored !== null
        ? stored
        : WORKS_FILE !== null
          ? WORKS_FILE
          : cloneDefault();
    if (worksFingerprint(next) === worksFingerprint(WORKS)) return;
    invalidateThumbsAndRelayout();
  });

  if (lbClose) {
    lbClose.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      closeLightbox();
    });
  }

  if (overlay) {
    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) closeLightbox();
    });
  }

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && lightboxOpen) {
      e.preventDefault();
      closeLightbox();
      return;
    }
    if (e.key === "Escape") {
      var mov = document.getElementById("mobile-nav-overlay");
      var tgl = document.getElementById("mobile-nav-toggle");
      if (mov && mov.classList.contains("is-open")) {
        e.preventDefault();
        mov.classList.remove("is-open");
        mov.setAttribute("aria-hidden", "true");
        if (tgl) tgl.setAttribute("aria-expanded", "false");
        document.body.style.overflow = "";
        document.body.classList.remove("mobile-menu-open");
      }
    }
  });

  initMobileThumbIntro();
  wireMobileNav();
  wireSiteNav();
})();
</script>
</body>
</html>
